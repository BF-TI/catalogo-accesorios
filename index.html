<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Accesorios — Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#0d0d0f; --surface:#16161a; --surface2:#1e1e24; --border:#2a2a35;
      --accent:#e8342a; --accent2:#ff6b35; --text:#f0f0f2; --muted:#7a7a8c;
      --success:#22c55e;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

    /* LOGIN */
    #login-screen{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      min-height:100vh;gap:2rem;
      background:radial-gradient(ellipse at 50% 0%, #1a0a08 0%, var(--bg) 70%);
    }
    .login-box{
      background:var(--surface);border:1px solid var(--border);border-radius:16px;
      padding:3rem 3.5rem;text-align:center;max-width:420px;width:90%;
    }
    .login-box h1{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;letter-spacing:3px;margin-bottom:.5rem;}
    .login-box h1 span{color:var(--accent);}
    .login-box p{color:var(--muted);margin-bottom:2rem;font-size:.95rem;}
    .login-options{display:flex;flex-direction:column;gap:.75rem;}
    .btn-role{
      display:flex;align-items:center;justify-content:center;gap:.75rem;
      border:1px solid var(--border);color:var(--text);padding:14px 28px;
      border-radius:10px;cursor:pointer;font-size:.95rem;font-family:'DM Sans',sans-serif;
      font-weight:500;width:100%;transition:all .2s;
    }
    .btn-admin{background:#1a0800;border-color:#e8342a40;}
    .btn-admin:hover{background:#2a0f00;border-color:var(--accent);transform:translateY(-1px);}
    .btn-user{background:#0a0a1a;border-color:#4a4a8040;}
    .btn-user:hover{background:#12122a;border-color:#7a7acc;transform:translateY(-1px);}
    .role-icon{font-size:1.2rem;}
    .login-note{font-size:.75rem;color:var(--muted);margin-top:1rem;}

    /* APP */
    #app{display:none;}

    header{
      background:var(--surface);border-bottom:1px solid var(--border);
      padding:0 2rem;display:flex;align-items:center;justify-content:space-between;
      height:64px;position:sticky;top:0;z-index:100;
    }
    .logo{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:2px;}
    .logo span{color:var(--accent);}
    .header-right{display:flex;align-items:center;gap:.75rem;}
    .demo-badge{
      background:#1a0800;border:1px solid #ff6b3540;color:#ff6b35;
      font-size:.7rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;
      padding:3px 10px;border-radius:20px;
    }
    .user-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:.85rem;}
    .avatar-admin{background:var(--accent);}
    .avatar-user{background:#3a3a8a;}
    .role-badge{font-size:.7rem;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:1px;text-transform:uppercase;}
    .badge-admin{background:var(--accent);color:white;}
    .badge-user{background:#3a3a8a;color:#c0c0ff;}
    .btn-switch{
      background:none;border:1px solid var(--border);color:var(--muted);
      padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.8rem;
      font-family:'DM Sans',sans-serif;transition:all .2s;
    }
    .btn-switch:hover{border-color:var(--accent2);color:var(--accent2);}

    /* ADMIN BAR */
    .admin-bar{
      background:#0d0500;border-bottom:1px solid #e8342a22;
      padding:8px 2rem;font-size:.82rem;color:#e8342a99;
      display:flex;align-items:center;gap:.5rem;
    }

    .layout{display:flex;min-height:calc(100vh - 64px);}

    aside{
      width:260px;min-width:260px;background:var(--surface);
      border-right:1px solid var(--border);padding:1.5rem 1rem;overflow-y:auto;
    }
    .filter-section{margin-bottom:1.5rem;}
    .filter-label{font-size:.7rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem;padding:0 .5rem;}
    .filter-btn{
      display:block;width:100%;text-align:left;background:none;border:none;
      color:var(--text);padding:8px 12px;border-radius:8px;cursor:pointer;
      font-size:.9rem;font-family:'DM Sans',sans-serif;transition:all .15s;margin-bottom:2px;
    }
    .filter-btn:hover{background:var(--surface2);}
    .filter-btn.active{background:var(--accent);color:white;font-weight:500;}
    .filter-count{float:right;font-size:.75rem;background:var(--surface2);padding:1px 7px;border-radius:10px;color:var(--muted);}
    .filter-btn.active .filter-count{background:rgba(255,255,255,.2);color:white;}

    main{flex:1;padding:2rem;overflow-y:auto;}
    .toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap;}
    .search-wrap{position:relative;flex:1;max-width:380px;}
    .search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);}
    #search{
      width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);
      padding:10px 12px 10px 40px;border-radius:8px;font-size:.9rem;font-family:'DM Sans',sans-serif;
      outline:none;transition:border-color .2s;
    }
    #search:focus{border-color:var(--accent);}
    #search::placeholder{color:var(--muted);}
    .results-count{color:var(--muted);font-size:.85rem;white-space:nowrap;}

    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.25rem;}

    .card{
      background:var(--surface);border:1px solid var(--border);border-radius:12px;
      overflow:hidden;transition:transform .2s,border-color .2s;position:relative;
    }
    .card:hover{transform:translateY(-3px);border-color:#3a3a48;}
    .card.inactive{opacity:.4;}
    .card-img{width:100%;aspect-ratio:4/3;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:3.5rem;}
    .card-body{padding:1rem;}
    .card-tags{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.6rem;}
    .tag{font-size:.68rem;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:2px 8px;border-radius:4px;}
    .tag-brand{background:#1e1e2e;color:#a0a0c0;border:1px solid #2a2a40;}
    .tag-model{background:#1a1a12;color:#b0a060;border:1px solid #2a2a18;}
    .card-name{font-size:.95rem;font-weight:500;margin-bottom:.3rem;}
    .card-sku{font-size:.75rem;color:var(--muted);margin-bottom:.75rem;}
    .card-price{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:1px;color:var(--accent2);}
    .card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border);}
    .status-dot{display:flex;align-items:center;gap:.4rem;font-size:.78rem;color:var(--muted);}
    .dot{width:7px;height:7px;border-radius:50%;}
    .dot.on{background:var(--success);box-shadow:0 0 6px var(--success);}
    .dot.off{background:#555;}

    /* TOGGLE — solo visible en admin */
    .toggle{position:relative;width:42px;height:22px;display:none;}
    .toggle input{opacity:0;width:0;height:0;}
    .slider{position:absolute;inset:0;background:var(--surface2);border:1px solid var(--border);border-radius:22px;cursor:pointer;transition:background .2s;}
    .slider:before{content:'';position:absolute;width:16px;height:16px;left:2px;top:2px;background:var(--muted);border-radius:50%;transition:transform .2s,background .2s;}
    .toggle input:checked + .slider{background:#0a2010;border-color:var(--success);}
    .toggle input:checked + .slider:before{transform:translateX(20px);background:var(--success);}
    body.is-admin .toggle{display:block;}

    /* Etiqueta "no disponible" solo admin la ve */
    .inactive-banner{
      position:absolute;top:10px;right:10px;background:rgba(0,0,0,.85);
      color:#666;font-size:.7rem;font-weight:600;letter-spacing:1px;
      text-transform:uppercase;padding:4px 10px;border-radius:4px;border:1px solid var(--border);
    }
    /* Usuario: ocultar inactivos */
    body:not(.is-admin) .card.inactive{display:none;}

    #toast{
      position:fixed;bottom:2rem;right:2rem;background:var(--surface2);border:1px solid var(--border);
      padding:12px 20px;border-radius:8px;font-size:.85rem;opacity:0;
      transition:opacity .3s;pointer-events:none;z-index:999;
    }
    #toast.show{opacity:1;}

    .empty{text-align:center;padding:4rem 2rem;color:var(--muted);}

    @media(max-width:768px){aside{display:none;}main{padding:1rem;}.grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));}}
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>ACCESORIOS<span>.</span></h1>
    <p>Catálogo de accesorios para vehículos nuevos</p>
    <div class="login-options">
      <button class="btn-role btn-admin" onclick="entrar('admin')">
        <span class="role-icon">🔐</span> Ingresar como Administrador
      </button>
      <button class="btn-role btn-user" onclick="entrar('user')">
        <span class="role-icon">👤</span> Ingresar como Vendedor
      </button>
    </div>
    <p class="login-note">Modo demo — en la versión final se usa login con Microsoft</p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div style="display:flex;align-items:center;gap:1rem;">
      <div class="logo">ACCESORIOS<span>.</span></div>
      <span class="demo-badge">Demo</span>
    </div>
    <div class="header-right">
      <div class="user-avatar" id="user-avatar"></div>
      <span id="user-name"></span>
      <span class="role-badge" id="role-badge"></span>
      <button class="btn-switch" onclick="volverLogin()">Cambiar rol</button>
    </div>
  </header>

  <div id="admin-bar" class="admin-bar" style="display:none">
    🛠️ Modo administrador — Usá los switches para activar o desactivar accesorios. Los vendedores solo ven los activos.
  </div>

  <div class="layout">
    <aside>
      <div class="filter-section">
        <div class="filter-label">Marca</div>
        <div id="brand-filters"></div>
      </div>
      <div class="filter-section">
        <div class="filter-label">Modelo</div>
        <div id="model-filters"></div>
      </div>
      <div class="filter-section">
        <div class="filter-label">Categoría</div>
        <div id="category-filters"></div>
      </div>
    </aside>

    <main>
      <div class="toolbar">
        <div class="search-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input id="search" type="text" placeholder="Buscar accesorio..."/>
        </div>
        <span class="results-count" id="results-count">— productos</span>
      </div>
      <div id="grid-container"></div>
    </main>
  </div>
</div>

<div id="toast"></div>

<script>
const DEMO_DATA = [
  {id:'1', nombre:'Tapetes de goma premium',   marca:'Toyota',    modelo:'Corolla', categoria:'Interior',    sku:'TAP-001', precio:45000,  emoji:'🟫', activo:true},
  {id:'2', nombre:'Deflectores de viento',      marca:'Toyota',    modelo:'Corolla', categoria:'Exterior',    sku:'DEF-002', precio:68000,  emoji:'💨', activo:true},
  {id:'3', nombre:'Alarma con GPS',             marca:'Toyota',    modelo:'Corolla', categoria:'Seguridad',   sku:'ALM-003', precio:120000, emoji:'🔐', activo:true},
  {id:'4', nombre:'Cámara de retroceso',        marca:'Toyota',    modelo:'Hilux',   categoria:'Electrónica', sku:'CAM-004', precio:89000,  emoji:'📷', activo:true},
  {id:'5', nombre:'Estribos laterales',         marca:'Toyota',    modelo:'Hilux',   categoria:'Exterior',    sku:'EST-005', precio:195000, emoji:'🚪', activo:true},
  {id:'6', nombre:'Cubierta de toldo',          marca:'Toyota',    modelo:'Hilux',   categoria:'Exterior',    sku:'CUB-006', precio:280000, emoji:'🏕️', activo:false},
  {id:'7', nombre:'Tapetes 3D impermeables',    marca:'Chevrolet', modelo:'Sail',    categoria:'Interior',    sku:'TAP-007', precio:38000,  emoji:'🟦', activo:true},
  {id:'8', nombre:'Parasol parabrisas',         marca:'Chevrolet', modelo:'Sail',    categoria:'Interior',    sku:'PAR-008', precio:18000,  emoji:'☀️', activo:true},
  {id:'9', nombre:'Radio Apple CarPlay',        marca:'Chevrolet', modelo:'Captiva', categoria:'Electrónica', sku:'RAD-009', precio:350000, emoji:'📱', activo:true},
  {id:'10',nombre:'Barras de techo',            marca:'Chevrolet', modelo:'Captiva', categoria:'Exterior',    sku:'BAR-010', precio:145000, emoji:'🔩', activo:false},
  {id:'11',nombre:'Sensor de estacionamiento',  marca:'Kia',       modelo:'Sportage',categoria:'Seguridad',   sku:'SEN-011', precio:75000,  emoji:'📡', activo:true},
  {id:'12',nombre:'Neblineros LED',             marca:'Kia',       modelo:'Sportage',categoria:'Iluminación', sku:'NEB-012', precio:95000,  emoji:'💡', activo:true},
  {id:'13',nombre:'Tapizado de cuero',          marca:'Kia',       modelo:'Rio',     categoria:'Interior',    sku:'TAP-013', precio:420000, emoji:'🪑', activo:true},
  {id:'14',nombre:'Llanta de aleación 17"',     marca:'Kia',       modelo:'Rio',     categoria:'Ruedas',      sku:'LLA-014', precio:180000, emoji:'⚙️', activo:false},
  {id:'15',nombre:'Cargador inalámbrico',       marca:'Hyundai',   modelo:'Tucson',  categoria:'Electrónica', sku:'CAR-015', precio:55000,  emoji:'🔋', activo:true},
  {id:'16',nombre:'Protector de maletero',      marca:'Hyundai',   modelo:'Tucson',  categoria:'Interior',    sku:'PRO-016', precio:32000,  emoji:'🧳', activo:true},
];

let allData = DEMO_DATA.map(d=>({...d}));
let activeFilters = {brand:null, model:null, category:null};
let currentRole = null;

function entrar(role) {
  currentRole = role;
  const isAdmin = role === 'admin';

  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('admin-bar').style.display = isAdmin ? 'flex' : 'none';

  if(isAdmin) {
    document.body.classList.add('is-admin');
    document.getElementById('user-avatar').textContent = 'SV';
    document.getElementById('user-avatar').className = 'user-avatar avatar-admin';
    document.getElementById('user-name').textContent = 'Sebastián Villablanca';
    document.getElementById('role-badge').textContent = 'Admin';
    document.getElementById('role-badge').className = 'role-badge badge-admin';
  } else {
    document.body.classList.remove('is-admin');
    document.getElementById('user-avatar').textContent = 'VE';
    document.getElementById('user-avatar').className = 'user-avatar avatar-user';
    document.getElementById('user-name').textContent = 'Vendedor';
    document.getElementById('role-badge').textContent = 'Vendedor';
    document.getElementById('role-badge').className = 'role-badge badge-user';
  }

  activeFilters = {brand:null, model:null, category:null};
  document.getElementById('search').value = '';
  buildFilters();
  renderGrid();
}

function volverLogin() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.body.classList.remove('is-admin');
  currentRole = null;
}

function buildFilters() {
  const base = currentRole === 'admin' ? allData : allData.filter(d=>d.activo);
  const brands = [...new Set(base.map(d=>d.marca))].sort();
  const models = activeFilters.brand
    ? [...new Set(base.filter(d=>d.marca===activeFilters.brand).map(d=>d.modelo))].sort()
    : [...new Set(base.map(d=>d.modelo))].sort();
  const cats = [...new Set(base.map(d=>d.categoria))].sort();

  renderFilterList('brand-filters',    brands, 'brand',    'marca');
  renderFilterList('model-filters',    models, 'model',    'modelo');
  renderFilterList('category-filters', cats,   'category', 'categoria');
}

function renderFilterList(cid, items, fkey, dkey) {
  const base = currentRole === 'admin' ? allData : allData.filter(d=>d.activo);
  const c = document.getElementById(cid);
  c.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn'+(activeFilters[fkey]===null?' active':'');
  allBtn.textContent = 'Todos';
  allBtn.onclick = ()=>setFilter(fkey,null);
  c.appendChild(allBtn);
  items.forEach(item=>{
    const count = base.filter(d=>d[dkey]===item).length;
    const btn = document.createElement('button');
    btn.className = 'filter-btn'+(activeFilters[fkey]===item?' active':'');
    btn.innerHTML = `${item} <span class="filter-count">${count}</span>`;
    btn.onclick = ()=>setFilter(fkey,item);
    c.appendChild(btn);
  });
}

function setFilter(key, value) {
  activeFilters[key] = value;
  if(key==='brand') activeFilters.model = null;
  buildFilters();
  renderGrid();
}

function renderGrid() {
  const q = document.getElementById('search').value.toLowerCase();
  const container = document.getElementById('grid-container');
  const base = currentRole === 'admin' ? allData : allData.filter(d=>d.activo);

  let filtered = base.filter(item=>{
    if(activeFilters.brand    && item.marca     !== activeFilters.brand)    return false;
    if(activeFilters.model    && item.modelo    !== activeFilters.model)    return false;
    if(activeFilters.category && item.categoria !== activeFilters.category) return false;
    if(q && !`${item.nombre} ${item.sku} ${item.marca} ${item.modelo}`.toLowerCase().includes(q)) return false;
    return true;
  });

  document.getElementById('results-count').textContent = `${filtered.length} accesorio${filtered.length!==1?'s':''}`;

  if(filtered.length===0){
    container.innerHTML='<div class="empty"><p style="font-size:2rem;margin-bottom:.5rem">🔍</p><p>Sin resultados</p></div>';
    return;
  }

  container.innerHTML='';
  const grid = document.createElement('div');
  grid.className='grid';

  filtered.forEach(item=>{
    const card = document.createElement('div');
    card.className='card'+(item.activo?'':' inactive');
    card.innerHTML=`
      ${!item.activo?'<span class="inactive-banner">No disponible</span>':''}
      <div class="card-img">${item.emoji}</div>
      <div class="card-body">
        <div class="card-tags">
          <span class="tag tag-brand">${item.marca}</span>
          <span class="tag tag-model">${item.modelo}</span>
        </div>
        <div class="card-name">${item.nombre}</div>
        <div class="card-sku">SKU: ${item.sku}</div>
        <div class="card-price">$${item.precio.toLocaleString('es-CL')}</div>
        <div class="card-footer">
          <div class="status-dot">
            <span class="dot ${item.activo?'on':'off'}"></span>
            <span class="status-text">${item.activo?'Disponible':'No disponible'}</span>
          </div>
          <label class="toggle">
            <input type="checkbox" ${item.activo?'checked':''} onchange="toggleItem('${item.id}',this)"/>
            <span class="slider"></span>
          </label>
        </div>
      </div>`;
    grid.appendChild(card);
  });
  container.appendChild(grid);
}

function toggleItem(id, checkbox) {
  const item = allData.find(d=>d.id===id);
  if(!item) return;
  item.activo = checkbox.checked;
  const card = checkbox.closest('.card');
  card.classList.toggle('inactive', !item.activo);
  card.querySelector('.dot').className='dot '+(item.activo?'on':'off');
  card.querySelector('.status-text').textContent = item.activo?'Disponible':'No disponible';
  // Actualizar conteos en sidebar
  buildFilters();
  toast((item.activo?'✓ Activado: ':'○ Desactivado: ')+item.nombre);
}

function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

document.getElementById('search').addEventListener('input', renderGrid);
</script>
</body>
</html>
